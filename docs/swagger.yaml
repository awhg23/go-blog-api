basePath: /api
definitions:
  handler.CreateCommentRequest:
    properties:
      content:
        maxLength: 500
        type: string
    required:
    - content
    type: object
  handler.CreatePostRequest:
    properties:
      content:
        type: string
      title:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - content
    - title
    type: object
  handler.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  handler.RegisterRequest:
    properties:
      password:
        maxLength: 20
        minLength: 6
        type: string
      username:
        maxLength: 20
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
host: localhost:8080
info:
  contact:
    email: awhg23@outlook.com
    name: API Support
  description: 这是一个基于 Go + Gin + GORM 开发的博客项目后端 API 文档
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Go 博客后端 API
  version: "1.0"
paths:
  /comments/:id:
    delete:
      consumes:
      - application/json
      description: 删除评论（需要登录，只能删除自己的评论）
      parameters:
      - description: 评论ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未登录或Token无效
          schema:
            additionalProperties: true
            type: object
        "403":
          description: 越权操作：只能删除自己的评论
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 评论不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 删除失败
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: 删除评论
      tags:
      - 评论模块
  /login:
    post:
      consumes:
      - application/json
      description: 校验账号密码并返回 JWT Token
      parameters:
      - description: 账号和密码
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功，返回 JWT Token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误（账号和密码不能为空）
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 用户名或密码错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 系统异常，生成 Token 失败
          schema:
            additionalProperties: true
            type: object
      summary: 用户登录
      tags:
      - 用户模块
  /posts:
    get:
      consumes:
      - application/json
      description: 获取文章列表，支持分页和缓存（无需登录，默认每页10条）
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 文章列表获取成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 获取文章列表失败
          schema:
            additionalProperties: true
            type: object
      summary: 获取文章列表（分页）
      tags:
      - 文章模块
    post:
      consumes:
      - application/json
      description: 发布一篇新的博客文章（需登录验证）
      parameters:
      - description: 文章标题和内容
        in: body
        name: post
        required: true
        schema:
          $ref: '#/definitions/handler.CreatePostRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 文章发布成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误（标题和内容不为空）
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未登录或Token无效
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 发布文章失败
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer // 这个标签说明该接口需要右上角的 Token 鉴权: []
      summary: 发布新文章
      tags:
      - 文章模块
  /posts/:id:
    delete:
      consumes:
      - application/json
      description: 删除指定 ID 的文章（需登录，只能删除自己的文章）
      parameters:
      - description: 文章ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 文章删除成功
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未登录或Token无效
          schema:
            additionalProperties: true
            type: object
        "403":
          description: 越权操作：只能删除自己的文章
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 文章不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 删除文章失败
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: 删除文章
      tags:
      - 文章模块
    put:
      consumes:
      - application/json
      description: 修改指定 ID 的文章（需登录，只能修改自己的文章）
      parameters:
      - description: 文章ID
        in: path
        name: id
        required: true
        type: integer
      - description: 修改后的文章标题和内容
        in: body
        name: post
        required: true
        schema:
          $ref: '#/definitions/handler.CreatePostRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 文章更新成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误（标题和内容不为空）
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未登录或Token无效
          schema:
            additionalProperties: true
            type: object
        "403":
          description: 越权操作：只能修改自己的文章
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 文章不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 更新文章失败
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: 修改文章
      tags:
      - 文章模块
  /posts/:id/comments:
    get:
      consumes:
      - application/json
      description: 获取某篇文章的评论列表（公开接口）
      parameters:
      - description: 文章ID
        in: path
        name: id
        required: true
        type: integer
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页数量，默认10
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 返回评论列表和分页信息
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 文章不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 获取评论列表失败
          schema:
            additionalProperties: true
            type: object
      summary: 获取某篇文章的评论列表（分页）
      tags:
      - 评论模块
    post:
      consumes:
      - application/json
      description: 发表评论（需要登录）
      parameters:
      - description: 评论内容
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateCommentRequest'
      - description: 文章ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 评论成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未登录或Token无效
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 文章不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 发表评论失败
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: 发表评论
      tags:
      - 评论模块
  /register:
    post:
      consumes:
      - application/json
      description: 注册新用户（账号需3-20位，密码需6-20位)
      parameters:
      - description: 账号和密码
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 注册成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误，账号需3-20位，密码需6-20位
          schema:
            additionalProperties: true
            type: object
        "409":
          description: 用户名已存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 用户创建失败
          schema:
            additionalProperties: true
            type: object
      summary: 用户注册
      tags:
      - 用户模块
securityDefinitions:
  Bearer:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
